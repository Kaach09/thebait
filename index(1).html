<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Bait</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

:root {
  --bg: #0d1015;
  --surface: #171c24;
  --surface2: #212836;
  --border: #333d4f;
  --text: #ece4d3;
  --text-dim: #8b93a3;
  --red: #b23a3a;
  --yellow: #c9a227;
  --blue: #2f8f95;
  --magenta: #b23f9e;
  --red-glow: rgba(178,58,58,0.16);
  --yellow-glow: rgba(201,162,39,0.18);
  --blue-glow: rgba(47,143,149,0.20);
  --magenta-glow: rgba(178,63,158,0.16);
}

body { margin: 0; background: var(--bg); }

.fab-app {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  padding: 0;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

.fab-app * { box-sizing: border-box; }

.fab-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
  background:
    radial-gradient(ellipse 70% 100% at 50% -10%, var(--blue-glow), transparent 55%),
    radial-gradient(circle at 10% 100%, var(--magenta-glow), transparent 45%),
    radial-gradient(circle at 90% 100%, var(--red-glow), transparent 45%);
  text-align: center;
}

.bait-logo { display: flex; justify-content: center; margin-bottom: 4px; }

.onboarding-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 10000;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.onboarding-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 26px; max-width: 420px; width: 100%; max-height: 85vh; overflow-y: auto;
  animation: slideFromRight 0.25s ease;
  font-family: 'Inter', sans-serif; color: var(--text);
}
.onboarding-body p { font-size: 13px; color: var(--text-dim); line-height: 1.55; margin: 0 0 12px; }
.onboarding-body b { color: var(--text); }
.onboarding-check { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); margin-top: 10px; }
.onboarding-check input { width: auto; }

.fab-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--yellow);
  margin-bottom: 8px;
}

.fab-title {
  font-family: 'Cinzel', serif;
  font-weight: 800;
  font-size: 30px;
  letter-spacing: 1px;
  margin: 0;
  background: linear-gradient(90deg, var(--blue), var(--magenta) 50%, var(--yellow));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.fab-sub { font-size: 13px; color: var(--text-dim); margin-top: 8px; }

.pitch-chip {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px;
  color: #14161c; flex-shrink: 0;
}
.pitch-1 { background: var(--red); }
.pitch-2 { background: var(--yellow); }
.pitch-3 { background: var(--blue); }

.fab-gate { padding: 60px 24px; text-align: center; }
.fab-gate input {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 12px 16px; border-radius: 8px; font-size: 15px; width: 240px; max-width: 80%;
  margin: 16px 0; font-family: 'Inter', sans-serif;
}
.fab-gate input:focus { outline: none; border-color: var(--blue); }

.fab-btn {
  font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px;
  padding: 11px 22px; border-radius: 8px; border: none; cursor: pointer;
  transition: transform 0.12s ease, filter 0.12s ease;
}
.fab-btn:hover { filter: brightness(1.12); }
.fab-btn:active { transform: scale(0.97); }
.fab-btn-primary { background: var(--blue); color: #fff; }
.fab-btn-gold { background: var(--yellow); color: #14161c; }
.fab-btn-red { background: var(--red); color: #fff; }
.fab-btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
.fab-btn-sm { padding: 7px 12px; font-size: 12px; }

.fab-tabs {
  display: flex; gap: 2px; padding: 0 20px; border-bottom: 1px solid var(--border);
  background: var(--surface); overflow-x: auto;
}
.fab-tab {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-dim); background: none; border: none; padding: 14px 16px; cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap;
}
.fab-tab.active { color: var(--text); border-bottom-color: var(--yellow); }

.fab-body { padding: 22px 20px 32px; max-width: 640px; margin: 0 auto; }

.slide-from-right { animation: slideFromRight 0.32s ease; }
.slide-from-left { animation: slideFromLeft 0.32s ease; }
@keyframes slideFromRight {
  from { opacity: 0; transform: translateX(28px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideFromLeft {
  from { opacity: 0; transform: translateX(-28px); }
  to { opacity: 1; transform: translateX(0); }
}

.fab-userbar {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px;
  font-size: 12px; color: var(--text-dim); padding: 10px 20px;
  border-bottom: 1px solid var(--border); background: var(--surface);
}
.fab-userbar b { color: var(--text); }
.fab-userbar .balance { color: var(--yellow); font-family: 'JetBrains Mono', monospace; }
.fab-userbar button {
  background: none; border: none; color: var(--yellow); cursor: pointer;
  font-size: 12px; font-family: 'Inter', sans-serif; text-decoration: underline;
}

.cat-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.cat-pill {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.5px;
  padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-dim); cursor: pointer;
}
.cat-pill.active { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-glow); }

.bet-overview { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.bet-overview-item {
  flex: 1; min-width: 150px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--text-dim);
}
.bet-overview-num {
  display: block; font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 800;
  color: var(--yellow); margin-bottom: 2px;
}

.cat-tag, .type-badge, .mult-badge {
  display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.5px; padding: 3px 8px; border-radius: 5px;
  background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border);
  margin-right: 6px;
}
.type-badge { color: var(--blue); border-color: var(--blue); background: var(--blue-glow); }
.mult-badge { color: var(--magenta); border-color: var(--magenta); background: var(--magenta-glow); font-weight: 700; }
.mult-badge, .type-badge, .cat-tag { display: inline-block; }

.q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 14px; }
.q-card-header { cursor: pointer; }
.q-card-header-top { margin-bottom: 8px; }
.q-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.q-text { font-weight: 600; font-size: 15px; line-height: 1.4; }
.chevron { color: var(--text-dim); font-size: 13px; flex-shrink: 0; padding-top: 2px; }
.q-meta { font-size: 11px; color: var(--text-dim); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }

.opt-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.opt-btn {
  text-align: left; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 10px 14px; border-radius: 7px; cursor: pointer; font-size: 14px; font-family: 'Inter', sans-serif;
  display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%;
}
.opt-btn:hover { border-color: var(--blue); }
.opt-btn.picked { border-color: var(--yellow); background: var(--yellow-glow); }
.opt-btn.correct { border-color: var(--yellow); background: var(--yellow-glow); }
.opt-btn.wrong { opacity: 0.55; }
.opt-btn.disabled { cursor: default; }
.opt-left { display: flex; align-items: center; gap: 8px; }
.opt-odds {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--yellow);
  background: rgba(212,160,23,0.12); padding: 2px 7px; border-radius: 5px; flex-shrink: 0;
}
.opt-badges { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.picked-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.5px;
  color: var(--blue); background: var(--blue-glow); border: 1px solid var(--blue);
  padding: 2px 7px; border-radius: 5px;
}
.delta-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 5px; flex-shrink: 0;
}
.delta-pos { color: #3ba55d; background: rgba(59,165,93,0.15); }
.delta-neg { color: var(--red); background: rgba(192,57,43,0.15); }

.stake-gauge { margin-top: 16px; }
.stake-gauge-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; }
.stake-gauge input[type=range] { width: 100%; accent-color: var(--yellow); height: 6px; cursor: pointer; }
.stake-gauge-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.stake-gauge-row input[type=number] {
  width: 90px; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 9px 10px; border-radius: 7px; font-size: 13px; font-family: 'JetBrains Mono', monospace;
}
.bet-summary { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

.sort-controls { display: flex; align-items: center; gap: 6px; margin-top: 14px; }
.sort-label { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
.sort-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 4px 10px;
  border-radius: 14px; cursor: pointer;
}
.sort-btn.active { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-glow); }

.public-votes { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px; }
.vote-row {
  display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
  font-size: 12px; padding: 7px 0; border-bottom: 1px solid var(--border);
}
.vote-row:last-child { border-bottom: none; }
.vote-user { color: var(--text); font-weight: 600; }
.vote-choice { color: var(--text-dim); font-size: 11px; flex: 1; text-align: right; padding: 0 8px; }
.vote-stake { color: var(--yellow); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }

.fab-empty { text-align: center; padding: 50px 20px; color: var(--text-dim); }
.fab-empty .pitch-chip { margin-bottom: 10px; }

.lead-table { width: 100%; border-collapse: collapse; }
.lead-table td, .lead-table th { padding: 10px 8px; text-align: left; font-size: 14px; border-bottom: 1px solid var(--border); }
.lead-table th { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.lead-rank { font-family: 'JetBrains Mono', monospace; font-weight: 700; width: 30px; }
.lead-pts { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--yellow); text-align: right; }

.chart-box { margin-top: 22px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }

.matrix-wrap { overflow: auto; max-height: 65vh; border: 1px solid var(--border); border-radius: 8px; }
.matrix-table { border-collapse: collapse; font-size: 13px; }
.matrix-table th, .matrix-table td { border: 1px solid var(--border); padding: 0; text-align: center; }
.matrix-table thead th {
  position: sticky; top: 0; background: var(--surface2); z-index: 3;
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; white-space: nowrap;
  padding: 9px 8px; color: var(--text);
}
.matrix-table thead th:first-child { z-index: 4; }
.matrix-table tbody th {
  position: sticky; left: 0; background: var(--surface2); z-index: 2;
  text-align: left; padding: 8px 12px; white-space: nowrap;
  font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; color: var(--text);
}
.matrix-table tbody tr:nth-child(even) td:not(.matrix-self) { background: rgba(255,255,255,0.02); }
.matrix-cell input {
  width: 58px; height: 38px; background: transparent; border: none; color: var(--yellow);
  text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700;
}
.matrix-cell input::placeholder { color: var(--text-dim); font-weight: 400; }
.matrix-cell input:focus { outline: 2px solid var(--yellow); background: var(--surface); }
.matrix-self { color: var(--text-dim); background: var(--surface); font-size: 15px; }

.hero-wr-list { max-height: 420px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }
.hero-wr-row { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-bottom: 1px solid var(--border); }
.hero-wr-row:last-child { border-bottom: none; }
.hero-wr-name { flex: 1; font-size: 13px; color: var(--text); }
.hero-wr-row input[type=number] {
  width: 64px; background: var(--surface2); border: 1px solid var(--border); color: var(--yellow);
  text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
  padding: 6px 4px; border-radius: 6px; flex-shrink: 0;
}

.account-pw-row { display: flex; align-items: center; gap: 8px; padding: 0 0 12px; margin-bottom: 8px; border-bottom: 1px solid var(--border); }
.account-pw-row:last-of-type { border-bottom: none; margin-bottom: 0; }
.account-pw-label { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
.account-pw-row input { flex: 1; font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--yellow); }

.fab-app input[type=number]::-webkit-outer-spin-button,
.fab-app input[type=number]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}
.fab-app input[type=number] {
  -moz-appearance: textfield;
  appearance: textfield;
}

.template-row { display: flex; align-items: center; gap: 8px; padding: 7px 0 4px; }
.template-row input[type=checkbox] { width: auto; flex-shrink: 0; }
.template-text { flex: 1; font-size: 13px; }
.template-type { flex: 0 0 110px; font-size: 12px; }
.template-mult { flex: 0 0 60px; font-size: 12px; text-align: center; }
.template-meta {
  display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
  padding: 0 0 12px 26px; margin-bottom: 8px; border-bottom: 1px solid var(--border);
  font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
}
.template-meta:last-of-type { border-bottom: none; margin-bottom: 0; }

.admin-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
.admin-box label { display: block; font-size: 12px; color: var(--text-dim); margin: 12px 0 6px; }
.admin-box input, .admin-box textarea, .admin-box select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 10px 12px; border-radius: 7px; font-size: 14px; font-family: 'Inter', sans-serif;
}
.admin-box textarea { resize: vertical; min-height: 44px; }

.hero-add-row { display: flex; gap: 8px; align-items: flex-start; margin-top: 8px; }
.hero-add-row > div { flex: 1; position: relative; }
.hero-add-row .wr-field { flex: 0 0 90px; }

.hero-suggest-box {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 30;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
  max-height: 190px; overflow-y: auto; display: none;
}
.hero-suggest-box.show { display: block; }
.hero-suggest-item {
  padding: 9px 12px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.hero-suggest-item:last-child { border-bottom: none; }
.hero-suggest-item:hover { background: rgba(212,160,23,0.12); }
.hero-suggest-item .wr-hint { color: var(--yellow); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.hero-suggest-empty { padding: 9px 12px; font-size: 12px; color: var(--text-dim); }

.opt-chip-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
.opt-chip {
  display: flex; align-items: center; gap: 8px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 20px; padding: 6px 8px 6px 14px; font-size: 13px;
}
.opt-chip .wr { color: var(--yellow); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.opt-chip button {
  background: var(--red); color: #fff; border: none; width: 18px; height: 18px; border-radius: 50%;
  cursor: pointer; font-size: 11px; line-height: 1; display: flex; align-items: center; justify-content: center;
}

.close-check-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; font-size: 13px; }
.close-check-row input { width: auto; }

.q-admin-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.q-admin-row:last-child { border-bottom: none; }
.small-actions { display: flex; gap: 6px; flex-shrink: 0; }
.small-actions button { font-size: 12px; padding: 6px 10px; }

.toast {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--yellow); color: var(--text);
  padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 50;
  opacity: 0; transition: opacity 0.25s ease; pointer-events: none;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="fab-app" id="fabApp">
  <div class="fab-header">
    <div class="bait-logo">
      <svg viewBox="0 0 64 64" width="40" height="40" aria-hidden="true">
        <path d="M32 6 C32 6 32 26 32 34 C32 42 40 42 40 34" fill="none" stroke="var(--yellow)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="32" cy="6" r="3" fill="var(--yellow)"/>
        <ellipse cx="24" cy="40" rx="12" ry="7" fill="var(--blue)"/>
        <path d="M13 40 L4 34 L4 46 Z" fill="var(--red)"/>
        <circle cx="29" cy="38" r="1.6" fill="var(--bg)"/>
      </svg>
    </div>
    <div class="fab-eyebrow">Callings &middot; Matchs &middot; Living Legend</div>
    <h1 class="fab-title">The Bait</h1>
    <div class="fab-sub">Mise ton capital. Les bonnes cotes paient plus. Grimpe au classement.</div>
  </div>
  <div id="fabRoot"></div>
  <div class="toast" id="fabToast"></div>
</div>

<div id="onboardingRoot"></div>

<!-- Client Supabase (remplace window.storage, qui n'existe que dans les artefacts Claude.ai) -->

  // Fusionne l'état distant (ce que d'autres joueurs ont pu sauvegarder entre-temps) avec
  // notre état local, au lieu d'écraser bêtement — évite que deux inscriptions/paris presque
  // simultanés s'effacent l'un l'autre.
  function mergeState(remote, local){
    const merged = JSON.parse(JSON.stringify(remote));
    ['accounts','displayNames','balances','history','tutorialSeen'].forEach(field => {
      merged[field] = Object.assign({}, remote[field]||{}, local[field]||{});
    });
    merged.picks = Object.assign({}, remote.picks||{});
    Object.keys(local.picks||{}).forEach(qId => {
      merged.picks[qId] = Object.assign({}, merged.picks[qId]||{}, local.picks[qId]||{});
    });
    merged.matchupMatrix = Object.assign({}, remote.matchupMatrix||{});
    Object.keys(local.matchupMatrix||{}).forEach(a => {
      merged.matchupMatrix[a] = Object.assign({}, merged.matchupMatrix[a]||{}, local.matchupMatrix[a]||{});
    });
    merged.heroWinRates = Object.assign({}, remote.heroWinRates||{}, local.heroWinRates||{});
    ['questions','tournaments'].forEach(field => {
      const byId = {};
      (remote[field]||[]).forEach(item => { byId[item.id] = item; });
      (local[field]||[]).forEach(item => { byId[item.id] = item; });
      merged[field] = Object.values(byId);
    });
    merged.questionTemplates = local.questionTemplates || remote.questionTemplates;
    return merged;
  }

  async function saveState(){
    try {
      const { data, error: fetchErr } = await sb.from('kv_store').select('value').eq('key', STATE_KEY).maybeSingle();
      if (fetchErr) throw fetchErr;
      if (data && data.value) {
        const remote = JSON.parse(data.value);
        state = mergeState(remote, state);
      }
      const { error } = await sb.from('kv_store').upsert({ key: STATE_KEY, value: JSON.stringify(state) }, { onConflict: 'key' });
      if (error) throw error;
    }
    catch(e) { console.error(e); showToast("Erreur de sauvegarde, réessaie."); }
  }

  function downloadCSV(filename, rows){
    const csv = rows.map(r => r.map(c => '"'+String(c===undefined||c===null?'':c).replace(/"/g,'""')+'"').join(',')).join('\r\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
  }

  function recordHistory(user){
    if (!state.history) state.history = {};
    if (!state.history[user]) state.history[user] = {};
    state.history[user][monthKey()] = state.balances[user].amount;
  }

  function ensureBalance(user){
    if (!state.balances) state.balances = {};
    const mk = monthKey();
    if (!state.balances[user]) {
      state.balances[user] = { amount: INITIAL_CAPITAL, month: mk };
      recordHistory(user);
      return true;
    }
    const bal = state.balances[user];
    if (bal.month !== mk) {
      const diff = monthsBetween(bal.month, mk);
      if (diff > 0) bal.amount += MONTHLY_BONUS * diff;
      bal.month = mk;
      recordHistory(user);
      return true;
    }
    return false;
  }

  function computeOdds(options){
    if (!options.every(o => typeof o.wr === 'number' && !isNaN(o.wr) && o.wr > 0)) return null;
    const sum = options.reduce((a,o)=>a+o.wr, 0);
    const map = {};
    options.forEach(o => { map[o.name] = (o.wr / sum) * 100; });
    return map;
  }

  function decimalOddsFor(q, name){
    const odds = computeOdds(q.options);
    if (odds && odds[name]) return 100 / odds[name];
    return q.options.length;
  }

  function effectiveOdds(q, name){
    return decimalOddsFor(q, name) * (q.multiplier || 1);
  }

  function computePotentialPayout(q, selected, stake){
    if (!q || !selected || selected.length === 0 || !stake) return 0;
    const sub = stake / selected.length;
    const sum = selected.reduce((s,name)=> s + effectiveOdds(q, name), 0);
    let payout = sub * sum;
    if (q.type === 'multiple' && selected.length > 1) payout += stake * MULTI_BONUS_PER_ANSWER * selected.length;
    return Math.round(payout);
  }

  function settlePayout(q, pick){
    const correctSet = Array.isArray(q.correct) ? q.correct : [q.correct];
    const sub = pick.stake / pick.options.length;
    let payout = 0;
    pick.options.forEach(name => {
      if (correctSet.includes(name)) payout += sub * effectiveOdds(q, name);
    });
    if (q.type === 'multiple' && pick.options.length > 1) {
      const isExactMatch = pick.options.length === correctSet.length && correctSet.every(name => pick.options.includes(name));
      if (isExactMatch) payout += pick.stake * MULTI_BONUS_PER_ANSWER * correctSet.length;
    }
    return Math.round(payout);
  }

  function animateCounters(){
    document.querySelectorAll('.bet-overview-num[data-target]').forEach(el => {
      const target = parseInt(el.dataset.target, 10) || 0;
      if (target === 0) { el.textContent = '0'; return; }
      const duration = 650;
      const startTime = performance.now();
      function step(now){
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(eased * target);
        if (progress < 1) requestAnimationFrame(step);
        else el.textContent = target;
      }
      requestAnimationFrame(step);
    });
  }

  function ensureChartJs(cb){
    if (window.Chart) { cb(); return; }
    if (window.__fabChartLoading) { window.__fabChartCallbacks = window.__fabChartCallbacks || []; window.__fabChartCallbacks.push(cb); return; }
    window.__fabChartLoading = true;
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js';
    s.onload = function(){

      window.__fabChartCallbacks = [];
    };

  function drawLeaderboardChart(){
    const canvas = document.getElementById('leaderboardChart');
    if (!canvas) return;
    ensureChartJs(function(){
      const canvasNow = document.getElementById('leaderboardChart');
      if (!canvasNow) return;
      const hist = state.history || {};
      const users = Object.keys(hist);
      if (users.length === 0) return;
      const monthsSet = {};
      users.forEach(u => Object.keys(hist[u]).forEach(m => { monthsSet[m] = true; }));
      const months = Object.keys(monthsSet).sort();
      const palette = ['#2f8f95','#b23a3a','#c9a227','#b23f9e','#5a8fd6','#8fbf6b','#d67ab8','#e0a253'];
      const datasets = users.map((u,i) => {
        let lastVal = null;
        const data = months.map(m => {
          if (hist[u][m] !== undefined) { lastVal = hist[u][m]; return hist[u][m]; }
          return lastVal;
        });
        return {
          label: displayNameFor(u), data,
          borderColor: palette[i % palette.length],
          backgroundColor: 'transparent', tension: 0.25, spanGaps: true
        };
      });
      if (window.__fabChartInstance) window.__fabChartInstance.destroy();
      window.__fabChartInstance = new Chart(canvasNow.getContext('2d'), {
        type: 'line',
        data: { labels: months, datasets },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: '#8b93a3' } } },
          scales: {
            x: { ticks: { color: '#8b93a3' }, grid: { color: 'rgba(255,255,255,0.06)' } },
            y: { ticks: { color: '#8b93a3' }, grid: { color: 'rgba(255,255,255,0.06)' } }
          }
        }
      });
    });
  }

    let open = base;
    if (betStatusFilterPron === 'placed') open = myBets;
    else if (betStatusFilterPron === 'unplaced') open = noBets;

    if (open.length === 0) {
      html += '<div class="fab-empty">'+pitchChip(1)+'<div>Aucun pronostic ici pour le moment.</div></div>';
      return html;
    }
    html += open.map(q => {
      const expanded = !!(window.__fabExpanded && window.__fabExpanded[q.id]);
      const existingPick = state.picks[q.id] && state.picks[q.id][currentUser];
      const pastDeadline = q.deadline && Date.now() > q.deadline;

      let summaryLine = q.options.length + ' options — clique pour parier';
      if (existingPick) summaryLine = '🎲 Pari en cours : '+existingPick.stake+' pts';
      else if (pastDeadline) summaryLine = '⏳ Votes clôturés — en attente du résultat';
      else if (q.deadline) summaryLine = '⏳ Clôture des votes : '+formatDate(q.deadline);

      let card = '<div class="q-card">';
      card += '<div class="q-card-header" onclick="fabApp.toggleExpand(\''+q.id+'\')">';
      card += '<div class="q-card-header-top"><span class="cat-tag">'+escapeHtml(q.category||'Autre')+'</span>'+
        '<span class="cat-tag" style="color:var(--magenta);border-color:var(--magenta)">'+escapeHtml(tournamentName(q.tournamentId))+'</span>'+
        '<span class="type-badge">'+typeLabel(q.type)+'</span>'+((q.multiplier&&q.multiplier!==1)?'<span class="mult-badge">x'+q.multiplier+'</span>':'')+'</div>';
      card += '<div class="q-head"><div class="q-text">'+escapeHtml(q.text)+'</div><span class="chevron">'+(expanded?'▾':'▸')+'</span></div>';
      card += '<div class="q-meta">'+summaryLine+'</div>';
      card += '</div>';

      if (expanded) {
        const selected = getSelected(q.id);
        const stakeVal = getStakeDraft(q.id);
        const available = state.balances[currentUser].amount + (existingPick ? existingPick.stake : 0);
        const locked = pastDeadline || !!existingPick;
        const opts = sortedOptions(q).map(o => {
          const isSel = selected.includes(o.name);
          const odds = effectiveOdds(q, o.name);
          if (locked) {
            return '<div class="opt-btn disabled'+(isSel?' picked':'')+'"><span class="opt-left">'+escapeHtml(o.name)+(isSel?checkBadge('pitch-3'):'')+'</span><span class="opt-odds">x'+odds.toFixed(2)+'</span></div>';
          }
          return '<button class="opt-btn'+(isSel?' picked':'')+'" onclick="fabApp.toggleOption(\''+q.id+'\',\''+escapeAttr(o.name)+'\',\''+q.type+'\')">'+
            '<span class="opt-left">'+escapeHtml(o.name)+(isSel?checkBadge('pitch-3'):'')+'</span><span class="opt-odds">x'+odds.toFixed(2)+'</span></button>';
        }).join('');
        card += sortControls(q.id);
        card += '<div class="opt-grid">'+opts+'</div>';

        if (pastDeadline) {
          card += '<div class="bet-summary" style="margin-top:12px">⏳ Votes clôturés'+(q.deadline?' le '+formatDate(q.deadline):'')+' — en attente du résultat.</div>';
          card += renderPublicVotes(q, false);
        } else if (existingPick) {
          card += '<div class="bet-summary" style="margin-top:12px">🔒 Pari verrouillé : '+existingPick.stake+' pts sur '+existingPick.options.map(escapeHtml).join(', ')+' — les mises sont définitives une fois validées.</div>';
        } else {
          const preview = computePotentialPayout(q, selected, parseFloat(stakeVal) || 0);
          card += '<div class="stake-gauge">'+
            '<div class="stake-gauge-label"><span>Mise</span><span id="stakeLabel-'+q.id+'">'+(stakeVal||0)+' / '+available+' pts</span></div>'+
            '<input type="range" min="0" max="'+available+'" step="1" id="stakeRange-'+q.id+'" value="'+(stakeVal||0)+'" oninput="fabApp.updateStakeDraft(\''+q.id+'\', this.value)" />'+
            '<div class="stake-gauge-row">'+
              '<input type="number" min="0" max="'+available+'" id="stake-'+q.id+'" value="'+escapeAttr(stakeVal)+'" oninput="fabApp.updateStakeDraft(\''+q.id+'\', this.value)" />'+
              '<button class="fab-btn fab-btn-ghost fab-btn-sm" onclick="fabApp.setMaxStake(\''+q.id+'\','+available+')">Max</button>'+
              '<button class="fab-btn fab-btn-gold fab-btn-sm" onclick="fabApp.placeBet(\''+q.id+'\')">Parier</button>'+
            '</div>'+
            '<div id="preview-'+q.id+'" class="bet-summary" style="margin-top:8px">Gain potentiel si juste : '+preview+' pts</div>'+
          '</div>';
        }
      }
      card += '</div>';
      return card;
    }).join('');
    return html;
  }

  function renderResultats(){
    let closed = state.questions.filter(q => q.status === 'closed');
    if (tournamentFilterRes !== 'Toutes') {
      closed = tournamentFilterRes === '__autre__' ? closed.filter(q => !q.tournamentId) : closed.filter(q => q.tournamentId === tournamentFilterRes);
    }
    let html = tournamentPills(tournamentFilterRes, 'setTournamentRes');
    if (closed.length > 0) {
      html += '<div style="margin-bottom:14px"><button class="fab-btn fab-btn-ghost fab-btn-sm" onclick="fabApp.exportResults()">⬇ Exporter les résultats en CSV</button></div>';
    }
    if (closed.length === 0) {
      html += '<div class="fab-empty">'+pitchChip(3)+'<div>Aucun résultat ici pour l\'instant.</div></div>';
      return html;
    }
    html += closed.map(q => {
      const expanded = !!(window.__fabExpanded && window.__fabExpanded[q.id]);
      const correctSet = Array.isArray(q.correct) ? q.correct : [q.correct];
      const pick = state.picks[q.id] && state.picks[q.id][currentUser];

      let summaryLine = q.options.length + ' options';
      let delta = 0;
      if (pick) {
        const payout = settlePayout(q, pick);
        delta = payout - pick.stake;
        summaryLine = (delta >= 0 ? '✓ +' : '✗ ') + delta + ' pts';
      } else summaryLine = 'Pas de pari';

      let card = '<div class="q-card">';
      card += '<div class="q-card-header" onclick="fabApp.toggleExpand(\''+q.id+'\')">';
      card += '<div class="q-card-header-top"><span class="cat-tag">'+escapeHtml(q.category||'Autre')+'</span>'+
        '<span class="cat-tag" style="color:var(--magenta);border-color:var(--magenta)">'+escapeHtml(tournamentName(q.tournamentId))+'</span>'+
        '<span class="type-badge">'+typeLabel(q.type)+'</span>'+((q.multiplier&&q.multiplier!==1)?'<span class="mult-badge">x'+q.multiplier+'</span>':'')+'</div>';
      card += '<div class="q-head"><div class="q-text">'+escapeHtml(q.text)+'</div><span class="chevron">'+(expanded?'▾':'▸')+'</span></div>';
      card += '<div class="q-meta">'+summaryLine+'</div>';
      card += '</div>';

      if (expanded) {
        const opts = sortedOptions(q).map(o => {
          const isCorrect = correctSet.includes(o.name);
          const isPicked = !!(pick && pick.options.includes(o.name));
          let cls = 'opt-btn disabled';
          if (isCorrect) cls += ' correct';
          if (isPicked && !isCorrect) cls += ' wrong';
          let badges = '';
          if (isCorrect) badges += checkBadge('pitch-2');
          if (isPicked) {
            const subStake = pick.stake / pick.options.length;
            const subReturn = isCorrect ? subStake * effectiveOdds(q, o.name) : 0;
            const subDelta = Math.round(subReturn - subStake);
            const deltaCls = subDelta >= 0 ? 'delta-pos' : 'delta-neg';
            badges += '<span class="delta-tag '+deltaCls+'">'+(subDelta>=0?'+':'')+subDelta+' pts</span>';
          }
          return '<div class="'+cls+'"><span class="opt-left">'+escapeHtml(o.name)+'</span><span class="opt-badges">'+badges+'</span></div>';
        }).join('');
        card += sortControls(q.id);
        card += '<div class="opt-grid">'+opts+'</div>';
        if (pick) {
          const payout = settlePayout(q, pick);
          card += '<div class="q-meta" style="margin-top:10px">Mise '+pick.stake+' pts, retour '+payout+' pts</div>';
        }
        card += renderPublicVotes(q, true);
      }
      card += '</div>';
      return card;
    }).join('');
    return html;
  }

  function renderClassement(){
    const entries = Object.entries(state.balances || {}).sort((a,b)=> b[1].amount - a[1].amount);
    let html = '<div class="fab-sub" style="margin-bottom:10px">Le capital ne repart jamais à zéro : chaque joueur reçoit +'+MONTHLY_BONUS+' pts au début de chaque mois, en plus de ce qu\'il a déjà.</div>';
    html += '<div style="margin-bottom:14px"><button class="fab-btn fab-btn-ghost fab-btn-sm" onclick="fabApp.exportLeaderboard()">⬇ Exporter le classement en CSV</button></div>';
    if (entries.length === 0) {
      html += '<div class="fab-empty">'+pitchChip(2)+'<div>Le classement apparaîtra dès qu\'un joueur aura un capital enregistré.</div></div>';
      return html;
    }
    const rows = entries.map(([user,bal], i) => {
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      return '<tr><td class="lead-rank">'+medal+'</td><td>'+escapeHtml(displayNameFor(user))+'</td><td class="lead-pts">'+bal.amount+'</td></tr>';
    }).join('');
    html += '<table class="lead-table"><thead><tr><th>#</th><th>Joueur</th><th style="text-align:right">Capital</th></tr></thead><tbody>'+rows+'</tbody></table>';
    html += '<div class="chart-box"><div class="fab-sub" style="margin-bottom:10px">Évolution du capital par mois</div><canvas id="leaderboardChart" height="220"></canvas></div>';
    return html;
  }

  function applyMatchupSuggestion(){
    if (newOpts.length !== 2) return false;
    const a = newOpts[0].name, b = newOpts[1].name;
    const mm = state.matchupMatrix || {};
    if (mm[a] && mm[a][b] !== undefined) {
      newOpts[0].wr = mm[a][b];
      newOpts[1].wr = (mm[b] && mm[b][a] !== undefined) ? mm[b][a] : Math.round((100 - mm[a][b]) * 10) / 10;
      return true;
    }
    return false;

          html += '<td class="matrix-cell"><input type="number" min="0" max="100" step="0.1" inputmode="decimal" value="'+draftVal+'" '+

  function parseCSV(text){
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++){
      const c = text[i];
      if (inQuotes){
        if (c === '"'){
          if (text[i+1] === '"'){ field += '"'; i++; } else inQuotes = false;
        } else field += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ','){ row.push(field); field = ''; }
        else if (c === '\n' || c === '\r'){
          if (c === '\r' && text[i+1] === '\n') i++;
          row.push(field); field = '';
          if (row.length > 1 || row[0] !== '') rows.push(row);
          row = [];
        } else field += c;
      }
    }
    if (field !== '' || row.length > 0) { row.push(field); rows.push(row); }
    return rows;
  }

    importMatrixCSV(fileInput){
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e){
        try {
          const rows = parseCSV(e.target.result);
          if (rows.length < 2) { showToast('Fichier CSV vide ou invalide.'); return; }
          const header = rows[0];
          const newMatrix = {};
          for (let r = 1; r < rows.length; r++){
            const row = rows[r];
            const heroA = row[0];
            if (!heroA) continue;
            newMatrix[heroA] = newMatrix[heroA] || {};
            for (let c = 1; c < header.length; c++){
              const heroB = header[c];
              if (!heroB || heroB === heroA) continue;
              const val = parseFloat(row[c]);
              if (!isNaN(val)) newMatrix[heroA][heroB] = val;
            }
          }
          state.matchupMatrix = newMatrix;
          Object.keys(newMatrix).forEach(a => {
            Object.keys(newMatrix[a]).forEach(b => {
              if (!newMatrix[b]) newMatrix[b] = {};
              if (newMatrix[b][a] === undefined) newMatrix[b][a] = Math.round((100 - newMatrix[a][b]) * 10) / 10;
            });
          });
          window.__fabMatrixDraft = null;
          renderBody();
          saveState();
          showToast('Matrice importée.');
        } catch(err){
          showToast('Erreur lors de la lecture du CSV.');
        }
      };
      reader.readAsText(file);
      fileInput.value = '';
    },

    async addTemplate(){
      if (!state.questionTemplates) state.questionTemplates = [];
      state.questionTemplates.push({
        id: 'custom' + Date.now(), text: 'Nouvelle question {tournoi}',
        type: 'single', multiplier: 1, optionsSource: 'custom', options: [], enabled: true
      });
      renderBody();
      await saveState();
      showToast('Modèle ajouté — pense à lui donner un texte et des réponses.');
    },
    async removeTemplate(i){
      if (!state.questionTemplates || !state.questionTemplates[i]) return;
      state.questionTemplates.splice(i, 1);
      renderBody();
      await saveState();
      showToast('Modèle supprimé.');
    },
    startEditTemplateOptions(i){
      const t = state.questionTemplates[i];
      if (!t) return;
      editingTemplateIdx = i;
      if (t.optionsSource === 'custom') {
        newOpts = (t.options || []).slice();
      } else if (t.optionsSource === 'placements') {
        newOpts = DEFAULT_PLACEMENT_OPTIONS.map(p => ({ name: p, wr: null }));
      } else {
        newOpts = HEROES.map(h => ({ name: h, wr: heroWr(h) }));
      }
      renderBody();
    },
    async saveTemplateOptions(){
      if (editingTemplateIdx === null || !state.questionTemplates[editingTemplateIdx]) return;
      if (newOpts.length < 2) { showToast('Ajoute au moins 2 réponses possibles.'); return; }
      state.questionTemplates[editingTemplateIdx].options = newOpts.slice();
      state.questionTemplates[editingTemplateIdx].optionsSource = 'custom';
      editingTemplateIdx = null;
      newOpts = [];
      renderBody();
      await saveState();
      showToast('Réponses du modèle enregistrées.');
    },
    cancelEditTemplateOptions(){
      editingTemplateIdx = null;
      newOpts = [];
      renderBody();
    },
    async deleteTournament(tId){
      state.tournaments = state.tournaments.filter(t=>t.id!==tId);
      renderBody();
      await saveState();
      showToast('Fiche tournoi supprimée.');
    },
    async addQuestion(){
      const text = document.getElementById('newQText').value.trim();
      const cat = document.getElementById('newQCat').value;
      const type = document.getElementById('newQType').value;
      const deadlineVal = document.getElementById('newQDeadline').value;
      const deadline = deadlineVal ? new Date(deadlineVal).getTime() : null;
      const multVal = parseFloat(document.getElementById('newQMultiplier').value);
      const multiplier = (multVal && multVal > 0) ? multVal : 1;
      if (!text || newOpts.length < 2) { showToast('Ajoute une question et au moins 2 options.'); return; }
      state.questions.push({ id: uid(), text, category: cat, type, deadline, multiplier, options: newOpts.slice(), status: 'open', correct: null, createdAt: Date.now() });
      newOpts = [];
      renderBody();
      await saveState();
      showToast('Question ajoutée !');
    },
    openCloseForm(qId){ window.__fabClosingId = qId; renderBody(); },
    cancelClose(){ window.__fabClosingId = null; renderBody(); },
    async publishNow(qId){
      const q = state.questions.find(x=>x.id===qId);
      if (!q) return;
      q.publishAt = null;
      renderBody();
      await saveState();
      showToast('Question publiée.');
    },
    async closeQuestion(qId){
      const q = state.questions.find(x=>x.id===qId);
      if (!q) return;
      let correctArr = [];
      if (q.type === 'single') {
        const sel = document.getElementById('closeSelect');
        if (sel) correctArr = [sel.value];
      } else {
        document.querySelectorAll('.close-check:checked').forEach(c => correctArr.push(c.value));
      }
      if (correctArr.length === 0) { showToast('Sélectionne au moins une bonne réponse.'); return; }
      q.correct = q.type === 'single' ? correctArr[0] : correctArr;
      q.status = 'closed';
      const picksForQ = state.picks[qId] || {};
      Object.keys(picksForQ).forEach(user => {
        ensureBalance(user);
        const payout = settlePayout(q, picksForQ[user]);
        state.balances[user].amount += payout;
        recordHistory(user);
      });
      window.__fabClosingId = null;
      renderBody();
      await saveState();
      showToast('Résultat validé, paris réglés.');
    },
    async deleteQuestion(qId){
      state.questions = state.questions.filter(x=>x.id!==qId);
      delete state.picks[qId];
      renderBody();
      await saveState();
      showToast('Question supprimée.');
    },
    async createAccount(){
      const idInp = document.getElementById('accId');
      const pwInp = document.getElementById('accPw');
      const nameInp = document.getElementById('accName');
      const idRaw = idInp.value.trim();
      const pw = pwInp.value;
      const displayName = nameInp.value.trim() || idRaw;
      if (!idRaw || !pw) { showToast('Identifiant et mot de passe requis.'); return; }
      const key = normKey(idRaw);
      if (!state.accounts) state.accounts = {};
      if (state.accounts[key]) { showToast('Ce compte existe déjà.'); return; }
      const salt = randomSalt();
      const hash = await hashPassword(pw, salt);
      state.accounts[key] = { salt, hash, password: pw, displayName, createdAt: Date.now() };
      if (!state.displayNames) state.displayNames = {};
      state.displayNames[key] = displayName;
      idInp.value = ''; pwInp.value = ''; nameInp.value = '';
      renderBody();
      await saveState();
      showToast('Compte créé.');
    },
    async updateAccountPassword(inputEl){
      const key = inputEl.dataset.account;
      const newPw = inputEl.value.trim();
      if (!newPw || !state.accounts[key]) return;
      const salt = randomSalt();
      const hash = await hashPassword(newPw, salt);
      state.accounts[key] = Object.assign({}, state.accounts[key], { salt, hash, password: newPw });
      await saveState();
      showToast('Mot de passe mis à jour pour '+displayNameFor(key)+'.');
    },
    async deleteUser(userKey){
      delete state.balances[userKey];
      if (state.displayNames) delete state.displayNames[userKey];
      if (state.history) delete state.history[userKey];
      if (state.accounts) delete state.accounts[userKey];
      Object.keys(state.picks).forEach(qId => {
        if (state.picks[qId] && state.picks[qId][userKey]) delete state.picks[qId][userKey];
      });
      const wasSelf = (currentUser === userKey);
      if (wasSelf) { currentUser = ''; currentUserDisplay = ''; }
      render();
      await saveState();
      showToast('Compte supprimé.');
    },
    exportLeaderboard(){
      const entries = Object.entries(state.balances||{}).sort((a,b)=>b[1].amount-a[1].amount);
      const rows = [['Rang','Joueur','Capital']];
      entries.forEach(([user,bal],i)=> rows.push([i+1, displayNameFor(user), bal.amount]));
      downloadCSV('classement-fab-pronostics.csv', rows);
    },
    exportResults(){
      const rows = [['Catégorie','Question','Type','Bonne(s) réponse(s)','Joueur','Choix','Mise','Retour','Gain ou perte']];
      state.questions.filter(q=>q.status==='closed').forEach(q=>{
        const correctTxt = Array.isArray(q.correct) ? q.correct.join(' / ') : q.correct;
        const picksForQ = state.picks[q.id] || {};
        const users = Object.keys(picksForQ);
        if (users.length === 0) {
          rows.push([q.category, q.text, typeLabel(q.type), correctTxt, '', '', '', '', '']);
        } else {
          users.forEach(u => {
            const pick = picksForQ[u];
            const payout = settlePayout(q, pick);
            rows.push([q.category, q.text, typeLabel(q.type), correctTxt, displayNameFor(u), pick.options.join(' / '), pick.stake, payout, payout - pick.stake]);
          });
        }
      });
      downloadCSV('resultats-fab-pronostics.csv', rows);
    }
  };

  (async function init(){
    root.innerHTML = '<div class="fab-empty">'+pitchChip(3)+'<div>Chargement...</div></div>';
    await loadState();
    render();
  })();
})();
</script>
</body>
</html>
